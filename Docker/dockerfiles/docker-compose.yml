version: 3.8


services:
  app:
    container_name: django-cont
    image: ayushamansingh/django-app:latest
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    container_name: django-db
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_USER=ayush
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=django
      - MYSQL_PASSWORD=123456
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:



